<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 420px;
      height: 680px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 44px; height: 44px;
      background: #0f3460;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-info h2 { color: white; font-size: 16px; font-weight: 600; }
    .status { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .dot { width: 8px; height: 8px; background: #48bb78; border-radius: 50%; }
    .status span { color: #a0aec0; font-size: 12px; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }
    .bot  .msg-icon { background: #ebf8ff; }
    .user .msg-icon { background: #e9d8fd; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bot  .bubble { background: #f7fafc; color: #2d3748; border-top-left-radius: 4px; }
    .user .bubble { background: #4f46e5; color: white; border-top-right-radius: 4px; }

    /* Typing indicator */
    .typing .bubble { padding: 12px 16px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: #a0aec0; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Suggestions */
    .suggestions {
      padding: 4px 16px 12px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .suggestion {
      background: #f7fafc; border: 1px solid #e2e8f0;
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; color: #4a5568;
      cursor: pointer; transition: all 0.2s;
    }
    .suggestion:hover { background: #ebf8ff; border-color: #90cdf4; color: #2b6cb0; }

    /* Input */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex; gap: 10px; align-items: center;
    }
    .input-area input {
      flex: 1; padding: 10px 14px;
      border: 1px solid #e2e8f0; border-radius: 24px;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #4f46e5; }
    .send-btn {
      width: 40px; height: 40px;
      background: #4f46e5; border: none;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0;
    }
    .send-btn:hover { background: #4338ca; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🛒</div>
    <div class="header-info">
      <h2>TechStore Support</h2>
      <div class="status">
        <div class="dot"></div>
        <span>Online · Replies instantly</span>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-icon">🤖</div>
      <div class="bubble">👋 Hi! Welcome to <strong>TechStore</strong> support. How can I help you today?</div>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div class="suggestions" id="suggestions">
    <div class="suggestion" onclick="sendSuggestion(this)">Return policy</div>
    <div class="suggestion" onclick="sendSuggestion(this)">Free shipping?</div>
    <div class="suggestion" onclick="sendSuggestion(this)">Track my order</div>
    <div class="suggestion" onclick="sendSuggestion(this)">Student discount</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input id="userInput" type="text" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
  const GROQ_API_KEY = prompt("Enter your Groq API key:") || "";
  const FAQ = `TechStore FAQ:
- Products: laptops, smartphones, tablets, headphones, smart home devices, accessories
- Student discount: 10% off with .edu email at checkout
- Price match: within 14 days, contact support with proof
- Standard shipping: 3-5 business days
- Express shipping: 1-2 days for $15
- Free shipping: orders over $50
- Ships to: US, Canada, UK, Australia
- Return policy: 30 days, original condition, full refund
- Start a return: Order History > Start Return > prepaid label emailed
- Refund time: 3-5 business days after item received
- Order tracking: tracking number sent by email, also in Order History
- Cancel/change order: within 1 hour of placement
- Password reset: click Forgot Password on login page
- Contact: support@techstore.com or 1-800-TECHSTORE, Mon-Fri 9am-6pm EST
- Tech support: Mon-Sat 10am-8pm EST, premium plan $9.99/month
- Warranty: 1-year manufacturer, extended 2-3 year available at checkout`;

  const history = [
    { role: "system", content: `You are a helpful customer service chatbot for TechStore, an electronics retailer. Use this FAQ to answer questions:\n${FAQ}\nBe friendly, concise and professional. If a question isn't in the FAQ, suggest contacting support@techstore.com.` }
  ];

  function appendMessage(role, text) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-icon">${role === "user" ? "🧑" : "🤖"}</div>
      <div class="bubble">${text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function showTyping() {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = "typing";
    div.innerHTML = `<div class="msg-icon">🤖</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function hideSuggestions() {
    document.getElementById("suggestions").style.display = "none";
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    hideSuggestions();
    appendMessage("user", text);
    history.push({ role: "user", content: text });
    showTyping();

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: "llama-3.1-8b-instant",
          messages: history,
          max_tokens: 1024
        })
      });
      const data = await res.json();
      const reply = data.choices[0].message.content;
      removeTyping();
      appendMessage("bot", reply);
      history.push({ role: "assistant", content: reply });
    } catch (err) {
      removeTyping();
      appendMessage("bot", "Sorry, something went wrong. Please try again.");
    }
  }

  function sendSuggestion(el) {
    document.getElementById("userInput").value = el.textContent;
    sendMessage();
  }
</script>

</body>
</html>
